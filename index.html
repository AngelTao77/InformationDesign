<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Information Design Final Project - Connected Aging</title>

    <meta

      content="0; url=https://ais-pre-qj36kbhur2fgbodnheevfz-344754378997.us-east1.run.app/"
    />

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f9fb;
        color: #1f2937;

      .container {

        padding: 32px;
        border-radius: 16px;

      p {
        line-height: 1.6;

      }

      a {
        color: #2563eb;
        font-weight: bold;
      }

      .button {
        display: inline-block;
        margin-top: 16px;
        padding: 12px 18px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        border-radius: 8px;
      }

      .button:hover {
        background: #1d4ed8;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Connected Aging Infographic</h1>

      <p>
        Redirecting you to the online scrolling infographic...
